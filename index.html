<!DOCTYPE html>
 <html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta property = "og:title" content="Faltômetro" />
  <meta property = "og:type" content="website" />
  <meta property = "og:image" content="https://lucasgflores.github.io/A3-Usabilidade/images/og-preview.png" />
  <meta property = "og:url" content="https://lucasgflores.github.io/A3-Usabilidade" />
  <meta property = "og:description" content="Gerencie suas faltas facilmente através deste app!" />
  <title>Fautômetro</title>
    <link rel="icon" type="image/png" href="icons/faltometro.ico" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css" />
</head>
 <div class="confirm-overlay" id="confirmOverlay" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
    <div class="confirm-sheet" id="confirmSheet" data-variant="danger">
 
      <div class="confirm-handle"></div>
 
      <div class="confirm-icon-wrap">
        <div class="confirm-icon" id="confirmIcon">
          <!-- ícone injetado via JS -->
        </div>
      </div>
 
      <div class="confirm-body">
        <p class="confirm-title" id="confirmTitle"></p>
        <p class="confirm-message" id="confirmMessage"></p>
      </div>
 
      <div class="confirm-divider"></div>
 
      <div class="confirm-actions">
        <button class="confirm-btn confirm-btn-proceed" id="confirmProceedBtn"></button>
        <button class="confirm-btn confirm-btn-cancel" id="confirmCancelBtn"></button>
      </div>
    </div>
  </div>
<body class="dark">

  <!-- SVG icon sprite (inline so <use href> works without a server) -->
  <!-- In production with a server, remove this block and keep only the <use> references -->
  <div id="svg-sprite" style="display:none" data-src="icons.svg"></div>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

  <!-- ╔══════════════════════════════════╗
       ║          PHONE FRAME             ║
       ╚══════════════════════════════════╝ -->
  <div class="phone-frame">

    <!-- Status bar -->
    <!-- Header row: theme toggle (left) · add button (right) -->
    <div class="header-row">

      <button class="theme-btn" onclick="toggleTheme()" aria-label="Alternar tema claro/escuro">
        <!-- Sun — visible in dark mode -->
        <svg class="theme-icon icon-sun" aria-hidden="true">
          <use href="icons.svg#icon-sun"/>
        </svg>
        <!-- Moon — visible in light mode -->
        <svg class="theme-icon icon-moon" aria-hidden="true">
          <use href="icons.svg#icon-moon"/>
        </svg>
      </button>

      <button class="add-btn" onclick="openAddModal()" aria-label="Adicionar matéria">
        <svg aria-hidden="true"><use href="icons.svg#icon-plus"/></svg>
      </button>

    </div>

    <!-- Swipe viewport — clipping boundary -->
    <div class="swipe-viewport" id="swipeViewport">

      <!-- Swipe track — slides live here, translated on drag -->
      <div class="swipe-track" id="swipeTrack">

        <!-- Slide (one per subject, generated by JS) -->
        <div class="swipe-slide" id="slide-0">

          <!-- Subject card — conteúdo gerado por buildSlideHTML() em slides.js -->
          <div class="subject-card">
            <div class="subject-name" id="subjectName">Usabilidade</div>
            <div class="subject-day">
              <span class="day-dot" id="dayDot"></span>
              <span id="weekdayLabel">quinta-feira</span>
            </div>
          </div>

          <!-- Ring / life bar -->
          <div class="circle-section">
            <div class="ring-wrapper">
              <svg class="ring-svg" viewBox="0 0 160 160" aria-hidden="true">
                <circle class="ring-bg"   cx="80" cy="80" r="66"/>
                <circle class="ring-fill" cx="80" cy="80" r="66" id="ringFill"/>
              </svg>
              <div class="ring-center" role="img" aria-labelledby="countDisplay">
                <span class="ring-number" id="countDisplay">10</span>
                <span class="ring-label">faltas</span>
              </div>
            </div>
            <div class="faltas-label">faltas restantes</div>
            <div class="faltas-status status-safe" id="statusBadge">✓ Tranquilo</div>
          </div>

        </div><!-- /slide-0 -->

      </div><!-- /swipe-track -->
    </div><!-- /swipe-viewport -->
    <div class="nav-dots" id="navDots" role="tablist" aria-label="Matérias"></div>

    <!-- Swipe hint arrow indicators -->
    <div class="swipe-arrows" id="swipeArrows">
      <button class="swipe-arrow" id="arrowPrev" onclick="navigateToLeft()" aria-label="Matéria anterior">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button class="swipe-arrow" id="arrowNext" onclick="navigateToRight()" aria-label="Próxima matéria">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>

    <div class="divider"></div>

    <!-- Action buttons -->
    <div class="bottom-container">
      <div class="bottom-actions">

        <button class="btn-primary btn-faltei" onclick="registrarFalta()">
          <svg class="icon-svg" aria-hidden="true"><use href="icons.svg#icon-alert-circle"/></svg>
          Faltei hoje
        </button>

        <button class="btn-primary btn-calendar" onclick="openCalendarModal()">
          <svg class="icon-svg" aria-hidden="true"><use href="icons.svg#icon-calendar"/></svg>
          ver calendário
        </button>

      </div>
        
    </div>

    <!-- Nav dots -->

  </div><!-- /phone-frame -->


  <!-- ╔══════════════════════════════════╗
       ║       MODAL — add subject        ║
       ╚══════════════════════════════════╝ -->
  <div class="modal-overlay" id="addModal"
       role="dialog" aria-modal="true" aria-labelledby="modalTitle"
       onclick="handleOverlayClick(event)">

    <div class="modal-sheet">
      <div class="modal-handle" aria-hidden="true"></div>
      <div class="modal-title" id="modalTitle">Nova matéria</div>
      <div class="modal-sub">Adicione uma matéria para acompanhar.</div>

      <input  class="modal-input"  id="newSubjectName" type="text"
              placeholder="Nome da matéria" autocomplete="off"/>

      <!-- Primeiro dia -->
      <select class="modal-select" id="newSubjectDay">
        <option value="">Dia da semana</option>
        <option value="domingo">Domingo</option>
        <option value="segunda-feira">Segunda-feira</option>
        <option value="terça-feira">Terça-feira</option>
        <option value="quarta-feira">Quarta-feira</option>
        <option value="quinta-feira">Quinta-feira</option>
        <option value="sexta-feira">Sexta-feira</option>
        <option value="sábado">Sábado</option>
      </select>

      <!-- Segundo dia (oculto por padrão) -->
      <div id="secondDayRow" style="display:none; align-items:center; gap:8px;">
        <select class="modal-select" id="newSubjectDay2">
          <option value="">Segundo dia</option>
          <option value="domingo">Domingo</option>
          <option value="segunda-feira">Segunda-feira</option>
          <option value="terça-feira">Terça-feira</option>
          <option value="quarta-feira">Quarta-feira</option>
          <option value="quinta-feira">Quinta-feira</option>
          <option value="sexta-feira">Sexta-feira</option>
          <option value="sábado">Sábado</option>
        </select>
        <button id="removeDayBtn" class="btn-remove-day" onclick="hideButtonCallback()" aria-label="Remover segundo dia">✕</button>
        
      </div>

      <!-- Botão para expandir segundo dia -->
      <button id="addDayBtn" class="btn-add-day" onclick="showSecondDay()">
        + Adicionar outro dia
      </button>

      <button class="btn-confirm" onclick="confirmButtonCallback()">Adicionar matéria</button>
      <button class="btn-cancel"  onclick="closeAddModal()">Cancelar</button>
    </div>

  </div><!-- /addModal -->


  <!-- ╔══════════════════════════════════╗
       ║     MODAL — calendar             ║
       ╚══════════════════════════════════╝ -->
  <div class="modal-overlay" id="calendarModal"
       role="dialog" aria-modal="true" aria-labelledby="calendarTitle"
       onclick="handleCalendarOverlayClick(event)">

    <div class="modal-sheet">

      <!-- Top bar: subject info + close -->
      <div class="cal-topbar">
        <div class="cal-topbar-info">
          <div class="cal-subject-name" id="calendarTitle">Matéria</div>
          <div class="cal-subject-day">
            <span class="day-dot" id="calendarDayDot"></span>
            <span id="calendarSubtitle"></span>
          </div>
        </div>
        <button class="cal-close-btn" onclick="closeCalendarModal()" aria-label="Fechar calendário">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6"  x2="6"  y2="18"/>
            <line x1="6"  y1="6"  x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <!-- Month navigator: prev · month label · next -->
      <div class="cal-nav">
        <button class="cal-nav-btn" id="calNavPrev"
                onclick="shiftCalendarMonth(-1)" aria-label="Mês anterior">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
        <span class="cal-month-title" id="calendarMonthLabel"></span>
        <button class="cal-nav-btn" id="calNavNext"
                onclick="shiftCalendarMonth(1)" aria-label="Próximo mês">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </button>
      </div>

      <div class="cal-divider"></div>

      <!-- Grid body: weekday headers + day cells (injected by JS) -->
      <div class="cal-body">
        <div class="cal-grid" id="calendarGrid"></div>
      </div>

      <!-- Legend -->
      <div class="cal-legend">
        <div class="cal-legend-item">
          <span class="cal-legend-dot cal-legend-absent"></span>Falta
        </div>
        <div class="cal-legend-item">
          <span class="cal-legend-dot cal-legend-present"></span>Presente
        </div>
        <div class="cal-legend-item">
          <span class="cal-legend-dot cal-legend-today"></span>Hoje
        </div>
      </div>

      <!-- Scrollable absence history -->
      <div class="cal-history">
        <div class="cal-history-title">Histórico de faltas</div>
        <div id="calendarAbsenceList"></div>
      </div>

    </div>
  </div><!-- /calendarModal -->

  <!-- App logic (ES modules) -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
