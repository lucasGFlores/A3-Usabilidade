<!--
  icons.svg — FaltaCount
  Sprite de ícones SVG reutilizáveis.

  USO:
    <svg><use href="icons.svg#icon-sun" /></svg>

  Para aplicar cor/tamanho via CSS, use currentColor no stroke/fill.
-->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">

  <!-- ── UI controls ────────────────────── -->

  <!-- Plus: adicionar matéria -->
  <symbol id="icon-plus" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="12" y1="5"  x2="12" y2="19"/>
    <line x1="5"  y1="12" x2="19" y2="12"/>
  </symbol>

  <!-- Sun: alternar para tema claro (mostrado no modo escuro) -->
  <symbol id="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="5"/>
    <line x1="12"   y1="1"     x2="12"   y2="3"/>
    <line x1="12"   y1="21"    x2="12"   y2="23"/>
    <line x1="4.22" y1="4.22"  x2="5.64" y2="5.64"/>
    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
    <line x1="1"    y1="12"    x2="3"    y2="12"/>
    <line x1="21"   y1="12"    x2="23"   y2="12"/>
    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
  </symbol>

  <!-- Moon: alternar para tema escuro (mostrado no modo claro) -->
  <symbol id="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
  </symbol>

  <!-- ── Status bar ─────────────────────── -->

  <!-- Wi-Fi -->
  <symbol id="icon-wifi" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M1.5 8.5C6 3.5 18 3.5 22.5 8.5"/>
    <path d="M5 12c3.8-4 10.2-4 14 0"/>
    <path d="M8.5 15.5c2-2 5-2 7 0"/>
    <circle cx="12" cy="19" r="1.2" fill="currentColor" stroke="none"/>
  </symbol>

  <!-- ── Action buttons ─────────────────── -->

  <!-- Alert circle: faltei hoje -->
  <symbol id="icon-alert-circle" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="10"/>
    <line x1="12" y1="8"     x2="12"   y2="12"/>
    <line x1="12" y1="16"    x2="12.01" y2="16"/>
  </symbol>

  <!-- Calendar: ver calendário -->
  <symbol id="icon-calendar" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="4" width="18" height="18" rx="2"/>
    <line x1="16" y1="2" x2="16" y2="6"/>
    <line x1="8"  y1="2" x2="8"  y2="6"/>
    <line x1="3"  y1="10" x2="21" y2="10"/>
  </symbol>

</svg>
